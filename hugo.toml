title = "My Media Tracker"
baseURL = "https://example.org/"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = true

[outputs]
  home = ["HTML", "RSS", "JSON", "RSS_FINISHED"]

[outputFormats]
[outputFormats.RSS_FINISHED]
  mediaType = "application/rss+xml"
  baseName = "finished"
  isPlainText = true
  notAlternative = true

[module]
  [[module.imports]]
    path = "github.com/christt105/hugo-mediatracker-theme"

[menu]
  [[menu.main]]
    identifier = 'library'
    pageRef = '/'
    name = 'Library'
    url = '/'
    weight = 20
  [[menu.main]]
    parent = 'library'
    pageRef = 'movies'
    name = 'Movies'
    url = '/movies/'
    weight = 1
  [[menu.main]]
    parent = 'library'
    pageRef = 'tv'
    name = 'Series'
    url = '/tv/'
    weight = 2
  [[menu.main]]
    parent = 'library'
    pageRef = 'games'
    name = 'Games'
    url = '/games/'
    weight = 3
  [[menu.main]]
    pageRef = 'stats'
    name = 'Stats'
    url = '/stats/'
    weight = 55
  [[menu.main]]
    pageRef = 'about'
    name = 'About'
    url = '/about/'
    weight = 60

[params]
  sitename = "My Media Tracker"
  defaultColor = "dark"
  description = "A personal log of the movies, series and games I watch and play."
  mainSections = ['movies', 'games', 'tv']
  toc = false
  goToTop = true
  dateFormat = "2 Jan 2006"

[params.author]
  intro = "My Media Tracker"
  name = "your-name"
  description = "Example site built with the hugo-mediatracker-theme."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/your-name"
